<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial GO</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background-color: #2e7d32; color: white; cursor: pointer; }
        .toggle-btn { background-color: #4fc3f7; color: black; }
        #app-section { display: none; }
        .match-card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; background: #fafafa; }
    </style>
</head>
<body>

    <div class="container" id="auth-section">
        <h2 id="auth-title">تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="authenticate()">دخول</button>
        <button class="toggle-btn" onclick="toggleMode()">إنشاء حساب جديد</button>
        <p id="msg" style="color: red;"></p>
    </div>

    <div class="container" id="app-section">
        <h2>مرحباً <span id="user-name"></span></h2>
        <div id="matches"></div>
        <button onclick="logout()" style="background-color: red;">خروج</button>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب';
            document.querySelector('#auth-section button').innerText = isLogin ? 'دخول' : 'تسجيل';
            document.querySelector('.toggle-btn').innerText = isLogin ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
        }

        async function authenticate() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const action = isLogin ? 'login' : 'register';

            try {
                const res = await fetch(`/api/auth?action=${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    showApp();
                } else {
                    msg.innerText = data.error;
                }
            } catch (err) {
                msg.innerText = "خطأ في الاتصال";
            }
        }

        function showApp() {
            if (localStorage.getItem('token')) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('user-name').innerText = localStorage.getItem('username');
                fetchMatches();
            }
        }

        async function fetchMatches() {
            const res = await fetch('/api/matches');
            const matches = await res.json();
            const div = document.getElementById('matches');
            div.innerHTML = matches.length ? matches.map(m => `<div class="match-card">${m.teamA} ضد ${m.teamB}</div>`).join('') : '<p>لا توجد مباريات</p>';
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = showApp;
    </script>
</body>
</html>
